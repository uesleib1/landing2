<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Caça-Palavras Fitoplâncton</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <div id="grid"></div>

  <div class="panel">
    <div id="wordList"></div>
  </div>
</div>

<div id="winScreen" class="win-screen hidden">
  <div class="win-card">
    <h1>Parabéns!</h1>
    <p>Você encontrou todas as palavras!</p>

    <button id="restartBtn">Jogar novamente</button>
  </div>
</div>

<div id="infoPopup" class="info-popup hidden">
  <div class="info-card">
    <p id="infoText"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
